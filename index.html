<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zeba-Rafat’s Cozy Home Stay</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#f5f1ea;
      --card:#fffdf9;
      --soft:#ece7df;
      --text:#2f2f2f;
      --muted:#8b857d;
      --accent:#c97c6d;
      --green:#7d9b7d;
      --shadow:0 10px 30px rgba(0,0,0,0.06);
      --radius:24px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:'Inter',sans-serif;
      min-height:100vh;
      overflow-x:hidden;
    }

    .wrapper{
      display:grid;
      grid-template-columns:1.3fr .8fr;
      gap:40px;
      padding:50px;
      min-height:100vh;
    }

    .title{
      font-family:'Cormorant Garamond', serif;
      font-size:4rem;
      font-weight:600;
    }

    .calendar-card{
      background:var(--card);
      border-radius:var(--radius);
      padding:30px;
      box-shadow:var(--shadow);
    }

    #calendar{min-height:700px;}

    .booking-card{
      background:var(--card);
      border-radius:32px;
      padding:35px;
      box-shadow:var(--shadow);
      position:sticky;
      top:30px;
    }

    input{
      width:100%;
      padding:14px;
      border:none;
      border-radius:16px;
      background:var(--soft);
    }

    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:18px;
      cursor:pointer;
      margin-top:10px;
    }

    .btn-check{background:#2f2f2f;color:white;}
    .btn-book{background:var(--green);color:white;}

    .message{
      margin-top:15px;
      padding:12px;
      border-radius:12px;
      display:none;
    }

    .success{background:#edf5ed;color:#456345;display:block;}
    .error{background:#f8e9e6;color:#8f5348;display:block;}

    .fc-event{
      background:#c97c6d !important;
      border:none !important;
      border-radius:10px !important;
    }
  </style>
</head>

<body>

<div class="wrapper">

  <!-- LEFT -->
  <div>
    <h1 class="title">Zeba-Rafat’s Cozy Home Stay ✦</h1>

    <div class="calendar-card">
      <div id="calendar"></div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="booking-card">

    <h2>Reserve Stay</h2>

    <input id="guestName" placeholder="Name">
    <input type="date" id="arrivalDate">
    <input type="time" id="arrivalTime">
    <input type="date" id="departureDate">
    <input type="time" id="departureTime">

    <button class="btn btn-check" onclick="checkAvailability()">
      Check Availability
    </button>

    <button class="btn btn-book" id="reserveBtn" disabled onclick="reserveStay()">
      Reserve
    </button>

    <div id="message" class="message"></div>

  </div>

</div>

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- OPTIONAL: config.js (GitHub-safe deployment) -->
<script src="config.js"></script>

<script>

if (!window.APP_CONFIG) {
  console.error("Missing config.js");
}

const supabase = window.supabase.createClient(
  window.APP_CONFIG?.SUPABASE_URL || "",
  window.APP_CONFIG?.SUPABASE_ANON_KEY || ""
);

let bookings = [];
let availabilityChecked = false;

const calendar = new FullCalendar.Calendar(
  document.getElementById('calendar'),
  {
    initialView: 'dayGridMonth',
    height: 'auto',
    events: [],
    headerToolbar: {
      left: 'prev,next',
      center: 'title',
      right: ''
    }
  }
);


async function loadBookings() {
  try {
    const { data, error } = await supabase
      .from('bookings')
      .select('*');

    if (error) throw error;

    bookings = (data || []).map(b => ({
      title: b.guest_name || "Guest",
      start: new Date(b.arrival).toISOString(),
      end: new Date(b.departure).toISOString()
    }));

    calendar.getEventSources().forEach(s => s.remove());
    calendar.addEventSource(bookings);

  } catch (err) {
    console.error("Load error:", err);

    document.getElementById('message').className = 'message error';
    document.getElementById('message').innerHTML =
      'Failed to load calendar data ⚠️';
  }
}


function checkAvailability() {

  const arrival = new Date(
    document.getElementById('arrivalDate').value +
    'T' +
    document.getElementById('arrivalTime').value
  );

  const departure = new Date(
    document.getElementById('departureDate').value +
    'T' +
    document.getElementById('departureTime').value
  );

  const message = document.getElementById('message');
  const reserveBtn = document.getElementById('reserveBtn');

  if (arrival >= departure) {
    message.className = 'message error';
    message.innerHTML = 'Invalid date range';
    reserveBtn.disabled = true;
    return;
  }

  const overlap = bookings.some(b => {
    const start = new Date(b.start);
    const end = new Date(b.end);
    return arrival < end && departure > start;
  });

  if (overlap) {
    message.className = 'message error';
    message.innerHTML = 'Dates already booked';
    reserveBtn.disabled = true;
    availabilityChecked = false;
  } else {
    message.className = 'message success';
    message.innerHTML = 'Available ✨';
    reserveBtn.disabled = false;
    availabilityChecked = true;
  }
}

async function reserveStay() {

  if (!availabilityChecked) return;

  const guest = document.getElementById('guestName').value;

  const arrival =
    document.getElementById('arrivalDate').value +
    'T' +
    document.getElementById('arrivalTime').value;

  const departure =
    document.getElementById('departureDate').value +
    'T' +
    document.getElementById('departureTime').value;

  const { error } = await supabase
    .from('bookings')
    .insert([{
      guest_name: guest,
      arrival,
      departure
    }]);

  const msg = document.getElementById('message');

  if (error) {
    console.error(error);
    msg.className = 'message error';
    msg.innerHTML = 'Booking failed ⚠️';
    return;
  }

  msg.className = 'message success';
  msg.innerHTML = 'Booking saved ✨';

  reserveBtn.disabled = true;
  loadBookings();
}

document.addEventListener('DOMContentLoaded', async () => {
  calendar.render();
  await loadBookings();
});
</script>

</body>
</html>
